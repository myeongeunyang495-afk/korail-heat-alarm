<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>체감온도 포스터 제작기</title>
  <meta name="description" content="기상청 데이터 기반 옥외작업 체감온도 포스터 제작 웹앱" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">기상청 데이터 기반</p>
        <h1>체감온도 포스터 제작기</h1>
      </div>
      <div class="actions">
        <a class="detail-link" href="https://heat-safety-app.netlify.app/" target="_blank" rel="noreferrer">체감온도 자동계산기</a>
        <button id="copyTextBtn" type="button">텍스트 복사</button>
        <button id="refreshBtn" type="button">데이터 새로고침</button>
        <button id="downloadBtn" type="button">PNG 저장</button>
      </div>
    </header>

    <div id="status" class="status">기상청 데이터를 불러오는 중입니다.</div>

    <section class="controls">
      <div>
        <p class="panel-eyebrow">1. 포스터에 넣을 지역 선택</p>
        <h2>지역 선택</h2>
      </div>
      <div id="regionSelector" class="region-selector"></div>
      <div class="control-actions">
        <button id="selectMetroBtn" type="button">서울·경기·인천</button>
        <button id="selectPrimaryBtn" type="button">주요 7개 지역</button>
        <button id="clearBtn" type="button">선택 해제</button>
      </div>
    </section>

    <section class="preview-section">
      <div>
        <p class="panel-eyebrow">2. 미리보기 확인 후 저장</p>
        <h2>포스터 미리보기</h2>
      </div>
      <canvas id="poster" width="1200" height="1600" aria-label="선택 지역 체감온도 안내 포스터"></canvas>
    </section>
  </main>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
