<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폭염특보 및 체감온도 포스터 생성기</title>
  <meta name="description" content="기상청 현재 실황과 예보 기반 폭염 포스터 생성 웹앱" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">옥외작업 체감온도 자동 계산</p>
          <h1>폭염특보 및 체감온도 안내</h1>
        </div>
        <div class="actions">
          <a class="detail-link" href="https://heat-safety-app.netlify.app/" target="_blank" rel="noreferrer">체감온도 자동계산기</a>
          <button id="copyTextBtn" type="button">텍스트 복사</button>
          <button id="refreshBtn" type="button">데이터 새로고침</button>
          <button id="downloadBtn" type="button">PNG 저장</button>
        </div>
      </header>

      <div id="status" class="status">기상청 현재 실황을 불러오는 중입니다.</div>

      <section id="regionPanel" class="region-panel" aria-live="polite">
        <div>
          <p class="panel-eyebrow">옥외작업 전 체감온도를 확인하세요</p>
          <h2 id="regionTitle">지역별 체감온도 현황</h2>
        </div>
        <div id="regionSummary" class="region-summary">서울, 경기, 인천 등 지도 안의 지역을 클릭하면 현재 체감온도와 시간대별 현황이 표시됩니다.</div>
        <div id="regionForecast" class="forecast-grid"></div>
      </section>

      <canvas id="poster" width="1200" height="1800" aria-label="폭염특보 및 체감온도 안내 포스터"></canvas>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
